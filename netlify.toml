[build]
  command = "node scripts/build-all.js"
  publish = "frontend/out"

# Blog routes
[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat"
  status = 200

# Main site catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
